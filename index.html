<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <!--    incluindo materialize-->
    <link rel="stylesheet" type="text/css" href="css/materialize.css"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
    <script src="js/jquery.min.js" type="text/javascript"></script>
    <script src="js/jquery.mask.min.js"></script>
    <script src="js/script.js"></script>
    
</head>

<body>
    <!-----------Menu---------------->
    <header>
        <nav id="menu">
            <div class="logo-gaby-modas">GABY MODAS</div>
        </nav>
    </header>
    <!---------------formulario----------------->
    
    
    <div id="formaulario-de-contato" class="row">
        <div class="col s12 m12 l6">
        <div class="card-panel">
          <h5 class="header2">Cadastre-se</h5>
          <div class="row">
            <form id="form-dados"  class="col s12">
            <!--nome completo-->
              <div class="row">
                <div class="input-field col s12">
                  <i class="small material-icons">person_pin</i>
                  <input placeholder="Nome Completo*" class="label-for" id="name3" type="text" required>
                </div>
              </div>
            <!--numero de whatsapp-->
              <div class="row">
                <div class="input-field col s12">
                  <i class="small material-icons">phone_android</i>
                  <input id="telefone" placeholder="Número do whatsapp*" id="email3" type="tel" required>
                </div>
              </div>
            <!--Rua-->
              <div class="row">
                <div class="input-field col s12">
                  <i class="small material-icons">location_on</i>
                  <input placeholder="Rua (endereço)*" id="email3" type="text" required>
                  
                </div>
              </div>
            <!--Numero da casa-->
              <div class="row">
                <div class="input-field col s12">
                  <i class="small material-icons">home
</i>
                  <input placeholder="Número da casa*" id="email3" type="text" maxlength="5" required>
                  
                </div>
              </div>
            <!--Bairro-->
              <div class="row">
                <div class="input-field col s12">
                  <i class="small material-icons">domain</i>
                  <input placeholder="Bairro*" id="email3" type="text" required>
                  
                </div>
              </div>
              <!--Cidade-->
              <div class="row">
                <div class="input-field col s12">
                  <i class="small material-icons">location_city</i>
                  <input placeholder="Cidade*" id="email3" type="text" required>
                  
                </div>
              </div>
             <!--CEP-->
              <div class="row">
                <div class="input-field col s12">
                    <img src="img/endereco-cep.png"/>
                  <input placeholder="CEP" id="email3" type="text">
                  
                </div>
              </div>
                <div class="row">
                  <div class="input-field col s12">
                    <button class="btn cyan waves-effect waves-light right" type="submit" name="action" onclick="funcao()">Enviar
            
                    </button>
                  </div>
                </div>
              
            </form>
          </div>
        </div>
        </div>
    </div>
    <footer id="footer">
        <div class="fb_page_plugin">
        <div id="fb-root"></div>
<script async defer src="https://connect.facebook.net/pt_BR/sdk.js#xfbml=1&version=v3.2&appId=574231669688686&autoLogAppEvents=1"></script>

        </div>
        
        
        





    </footer>
   


    
    
    
    
    
</body>
</html>
